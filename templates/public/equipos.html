{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 900px; background: transparent; border: none; box-shadow: none;">
    <h2 style="color: var(--accent-neon); text-align: center; margin-bottom: 40px; font-size: 2.5em; text-shadow: 0 0 10px var(--accent-neon);">
        ROSTER OFICIAL DEL TORNEO
    </h2>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        {% for equipo in equipos %}
        <div style="background: var(--card-bg); border: 1px solid #2d3748; padding: 30px 20px; border-radius: 8px; text-align: center; transition: transform 0.3s ease;">
            <div style="width: 60px; height: 60px; background: rgba(0, 243, 255, 0.1); border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent-neon);">
                <span style="font-size: 24px;">🛡️</span> </div>
            <h3 style="color: var(--text-main); font-size: 1.5em; margin-bottom: 10px;">{{ equipo.nombre }}</h3>
            <p style="color: var(--accent-neon); font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;">Status: Validado</p>
        </div>
        {% else %}
        <div style="grid-column: 1 / -1; text-align: center; padding: 50px; background: var(--card-bg); border-radius: 8px;">
            <p style="color: #a0aec0; font-size: 1.2em;">Aún no hay equipos con inscripción validada por el staff.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
