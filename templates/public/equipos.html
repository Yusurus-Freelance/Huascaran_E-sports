{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="text-center my-5" style="color: var(--accent-neon); text-shadow: 0 0 10px rgba(0,243,255,0.3);">
        ROSTER OFICIAL DEL TORNEO
    </h2>

    <div class="equipos-grid">
        {% for equipo in equipos %}
        <div class="equipo-card">
            <div style="width: 100px; height: 100px; border: 2px solid var(--accent-neon); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); margin-bottom: 15px;">
                {% if equipo.logo %}
                    <img src="{{ equipo.logo }}" alt="Logo" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <span style="font-size: 30px; font-weight: bold; color: var(--accent-neon);">
                        {{ equipo.nombre[:2].upper() }}
                    </span>
                {% endif %}
            </div>

            <h3 style="color: var(--text-main); font-size: 1.3rem; margin-bottom: 5px;">{{ equipo.nombre }}</h3>
            <p style="color: var(--accent-neon); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Status: Validado</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
