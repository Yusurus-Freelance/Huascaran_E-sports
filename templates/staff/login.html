{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <h2 class="login-title">ACCESO STAFF</h2>
    
    <form action="{{ url_for('staff.login') }}" method="POST" class="login-form">
        
        <div class="form-group">
            <label class="login-label">Usuario</label>
            <input type="text" name="usuario" class="login-input" required placeholder="Nombre de usuario">
        </div>

        <div class="form-group">
            <label class="login-label">Contraseña</label>
            <input type="password" name="password" class="login-input" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-neon w-100 mt-3" style="padding: 12px; font-size: 1.1em;">
            ENTRAR AL PANEL
        </button>
        
    </form>

    <div class="mt-4">
        <small style="color: #4a5568;">Solo personal autorizado de Huascarán E-Sports</small>
    </div>
</div>
{% endblock %}
