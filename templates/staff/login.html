{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 400px; margin: 80px auto;">
    <h2 style="color: var(--accent-neon); text-align: center; margin-bottom: 20px;">ACCESO STAFF</h2>
    
    {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
            <p style="color: #ff4d4d; text-align: center;">{{ messages[0] }}</p>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('staff.login') }}" method="POST" class="gamer-form">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="usuario" required>
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn-neon" style="width: 100%; margin-top: 20px;">Entrar al Panel</button>
    </form>
</div>
{% endblock %}
